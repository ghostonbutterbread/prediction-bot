# Prediction Market Bot — Central Configuration
# ================================================
# This file controls all bot behavior. Environment variables (.env)
# override values here for backward compatibility.
#
# To add a new market type: add a section under market_types.

# === OpenRouter Researcher ===
# The LLM quant researcher. Analyzes patterns, suggests strategy updates.
# Uses direct OpenRouter API calls (not sub-agent spawning).
openrouter:
  api_key_env: OPENROUTER_API_KEY        # env var name holding the key
  model: "minimax/minimax-m2.5"           # cheap deep reasoning model
  fallback_model: "google/gemini-2.5-flash"  # fallback if m2.5 fails
  max_tokens: 1024
  temperature: 0.3                        # low temp for analytical work
  daily_call_budget: 20                   # max API calls per day (cost control)
  cache_ttl_minutes: 30                   # reuse analysis for same market within window

# === Scan Schedule ===
# Phases activate based on time-to-event. Each market type can
# define its own phases or inherit defaults.
schedule:
  # Default phases (used if market type doesn't override)
  default_phases:
    quiet:
      max_hours_to_close: 999    # always active when nothing else matches
      interval_seconds: 300      # 5 minutes
      researcher_enabled: false  # no LLM calls in quiet mode
    active:
      max_hours_to_close: 4
      interval_seconds: 120      # 2 minutes
      researcher_enabled: true   # researcher runs on interesting signals
    hot:
      max_hours_to_close: 1
      interval_seconds: 30       # 30 seconds
      researcher_enabled: true
    live:
      max_hours_to_close: 0      # event has started
      interval_seconds: 15       # 15 seconds
      researcher_enabled: false  # too late for research, just trade

  # Override per market type (optional)
  sports:
    quiet:
      max_hours_to_close: 48
      interval_seconds: 300
      researcher_enabled: false
    active:
      max_hours_to_close: 4
      interval_seconds: 120
      researcher_enabled: true
    hot:
      max_hours_to_close: 1
      interval_seconds: 30
      researcher_enabled: true
    live:
      max_hours_to_close: 0
      interval_seconds: 15
      researcher_enabled: false

  politics:
    quiet:
      max_hours_to_close: 168    # 7 days
      interval_seconds: 600      # 10 minutes (politics is slow)
    active:
      max_hours_to_close: 24
      interval_seconds: 300
      researcher_enabled: true
    hot:
      max_hours_to_close: 2
      interval_seconds: 60
      researcher_enabled: true

# === Market Types ===
# Each type has its own strategy parameters, filters, and schedule.
# To add a new market type (e.g., "crypto", "weather"), add a section here.
market_types:
  sports:
    enabled: true
    max_hours_to_close: 48
    keywords:
      - "nba"
      - "nfl"
      - "mlb"
      - "nhl"
      - "soccer"
      - "football"
      - "basketball"
      - "game"
      - "match"
      - "win"
      - "score"
      - "points"
      - "spread"
      - "player"
      - "injury"
      - "playoff"
      - "championship"
    strategy_overrides:
      min_edge: 0.035        # sports move fast, VALIX proved 3.4% works
      min_confidence: 0.50
    researcher_prompts: "sports"   # references bot/researcher/prompts.py
    schedule: "sports"             # references schedule.sports above

  politics:
    enabled: false                 # disabled until we're ready
    max_hours_to_close: 720        # 30 days
    keywords:
      - "election"
      - "president"
      - "congress"
      - "senate"
      - "vote"
      - "poll"
      - "approval"
      - "policy"
      - "legislation"
    strategy_overrides:
      min_edge: 0.05               # politics needs higher edge
      min_confidence: 0.60
    researcher_prompts: "politics"
    schedule: "politics"

  # Example: future expansion
  # crypto:
  #   enabled: false
  #   max_hours_to_close: 24
  #   keywords: ["bitcoin", "eth", "price", "crypto"]
  #   strategy_overrides:
  #     min_edge: 0.03
  #   schedule: "default_phases"

  # weather:
  #   enabled: false
  #   keywords: ["temperature", "rain", "snow", "hurricane"]
  #   strategy_overrides:
  #     min_edge: 0.04
  #   schedule: "default_phases"

# === Strategy ===
strategy:
  min_edge: 0.035          # 3.5% — VALIX proved this works at scale
  min_confidence: 0.50
  news_weight: 0.15
  social_weight: 0.10
  ai_weight: 0.20
  enable_news: true
  enable_social: true
  enable_ai: true

# === Kelly / Risk ===
# Two presets: PAPER (aggressive for simulation) and LIVE (conservative for real money)
# Mode auto-detected from KALSHI_USE_DEMO env var:
#   KALSHI_USE_DEMO=true  → PAPER limits (Half-Kelly, 10% max bet, 20% daily loss)
#   KALSHI_USE_DEMO=false → LIVE limits (Quarter-Kelly, 5% max bet, 10% daily loss)
#
# Override individual values with env vars (e.g. KELLY_FRACTION=0.3)
risk:
  # ── Paper trading (KALSHI_USE_DEMO=true) ──
  kelly_fraction_paper: 0.50       # Half-Kelly
  max_bet_pct_paper: 0.10          # Max 10% per trade
  max_exposure_pct_paper: 0.40    # Max 40% of bankroll at risk
  daily_loss_limit_pct_paper: 0.20 # Stop if down 20% today
  max_drawdown_pct_paper: 0.50     # Pause if down 50% from peak
  max_open_positions_paper: 15    # Max 15 concurrent trades

  # ── Live trading (KALSHI_USE_DEMO=false) ──
  kelly_fraction_live: 0.25        # Quarter-Kelly — conservative for real money
  max_bet_pct_live: 0.05          # Max 5% per trade
  max_exposure_pct_live: 0.25     # Max 25% of bankroll at risk
  daily_loss_limit_pct_live: 0.10 # Stop if down 10% in a day
  max_drawdown_pct_live: 0.25     # Pause if down 25% from peak
  max_open_positions_live: 10     # Max 10 concurrent trades

  # ── Backward compat (overridden by mode detection) ──
  kelly_fraction: 0.50
  max_position_pct: 0.10
  daily_loss_limit_pct: 35
  max_drawdown_pct: 60
  max_open_positions: 15

# === Logging ===
logging:
  log_dir: "data"
  level: "INFO"
  save_snapshots: true
  snapshot_interval_scans: 5
